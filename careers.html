<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/white_Logo.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/tanishq0917t/Lets-Compile/static/careers_styles.css">
    <script src="https://cdn.jsdelivr.net/gh/tanishq0917t/Lets-Compile/static/careers_script.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T8EF7MJFGR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-T8EF7MJFGR");
    </script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        .career-page {
            padding: 10px;
            max-width: 600px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .job-list {
            list-style: none;
            padding: 0;
        }

        .job-posting {
            background-color: #1e1e1e;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .job-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .job-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 8px 0;
        }

        .job-location,
        .job-positions {
            font-size: 14px;
            margin: 0 0 5px 0;
        }

        .apply-btn {
            padding: 8px 12px;
            font-size: 14px;
            background-color: #6200ea;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            width: 120px;
        }

        .apply-btn:hover {
            background-color: #3700b3;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-height: 80%;
            overflow-y: auto;
            background-color: #333333;
            padding: 20px;
            border-radius: 8px;
            box-shadow: none;
            z-index: 1000;
        }

        .modal-content {
            max-height: 100%;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #6200ea;
            color: #ffffff;
            cursor: pointer;
        }

        button:hover {
            background-color: #3700b3;
        }

        /* Preferred genres removed from form; related styles omitted */

        #experience {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            gap: 15px;
            background-color: #333333;
            padding: 2px;
            border-radius: 5px;
        }

        #experience label {
            font-size: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #experience input[type="radio"] {
            width: auto;
            margin: 0;
        }

        /* Make location radios match experience radios */
        #location {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            gap: 15px;
            background-color: #333333;
            padding: 2px;
            border-radius: 5px;
        }

        #location label {
            font-size: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #location input[type="radio"] {
            width: auto;
            margin: 0;
        }

        /* Make languages checkbox group match experience layout */
        #languages {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            gap: 15px;
            background-color: #333333;
            padding: 2px;
            border-radius: 5px;
            align-items: center;
        }

        #languages label {
            font-size: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #languages input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        /* Make acting radios match experience radios */
        #acting {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            gap: 15px;
            background-color: #333333;
            padding: 2px;
            border-radius: 5px;
            align-items: center;
        }

        #acting label {
            font-size: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #acting input[type="radio"] {
            width: auto;
            margin: 0;
        }

        /* Make acting experience types checkboxes match experience layout */
        #actingTypes {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            gap: 15px;
            background-color: #333333;
            padding: 2px;
            border-radius: 5px;
            align-items: center;
        }

        #actingTypes label {
            font-size: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #actingTypes input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
    </style>
    <script>
        $(document).ready(function () {
            $("#loadingOverlay").hide();
            $.ajax({
                url: 'https://thefilmkaar.pythonanywhere.com/getJD',
                type: 'POST',
                success: function (response) {
                    const jobs = response.jobs; 
                    const jobList = document.querySelector('.job-list');
                    jobs.forEach(job => {
                        const li = document.createElement('li');
                        li.classList.add('job-posting');
                        li.dataset.jobId = job.id; 
                        li.innerHTML = `
                            <h2>${job.title}</h2>
                            <button class="apply-btn" 
                                data-job-id="${job.id}" 
                                data-job-title="${job.title}" 
                                data-job-description="${job.description}" 
                                data-job-responsibilities="${encodeURIComponent(JSON.stringify(job.responsibilities))}">Apply</button>
                        `;
                        jobList.appendChild(li);
                    });

                    $('.apply-btn').on('click', function () {
                        const jobId = $(this).data('job-id');
                        const jobTitle = $(this).data('job-title');
                        const jobDescription = $(this).data('job-description');
                        const jobResponsibilities = JSON.parse(decodeURIComponent($(this).data('job-responsibilities')));

                        openApplicationModal(jobId, jobTitle, jobDescription, jobResponsibilities);
                    });
                },
                error: function (err) {
                    console.error('Error fetching jobs:', err);
                }
            });

            function openApplicationModal(jobId, jobTitle, jobDescription, jobResponsibilities) {
                $('#job-title').text(jobTitle); 
                $('#j_id').text(jobId);
                $('#applicationModal').fadeIn(); 

                $('#applicationModal .modal-content p').text(jobDescription);

                const responsibilitiesList = $('#applicationModal .modal-content ul');
                responsibilitiesList.empty(); 
                jobResponsibilities.forEach(responsibility => {
                    responsibilitiesList.append(`<li>${responsibility}</li>`);
                });
            }
            $('.close-btn').on('click', function () {
                $('#applicationModal').fadeOut();
            });

            $('#job-application-form').on('submit', function (e) {
                e.preventDefault();
                alert('Application submitted!');
                $('#applicationModal').fadeOut();
            });
        });
        function validate() 
        {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age') ? document.getElementById('age').value.trim() : '';
            const height = document.getElementById('height') ? document.getElementById('height').value.trim() : '';
            const weight = document.getElementById('weight') ? document.getElementById('weight').value.trim() : '';
            const experience = document.querySelector('input[name="experience"]:checked').value;
            const location = document.querySelector('input[name="location"]:checked') ? document.querySelector('input[name="location"]:checked').value : '';
            const languages = Array.from(document.querySelectorAll('input[name="languages[]"]:checked')).map(cb => cb.value);
            const otherLanguage = document.getElementById('other-language') ? document.getElementById('other-language').value.trim() : '';
            const acting = document.querySelector('input[name="acting"]:checked') ? document.querySelector('input[name="acting"]:checked').value : '';
            const actingTypes = Array.from(document.querySelectorAll('input[name="acting_types[]"]:checked')).map(cb => cb.value);
            const social = document.getElementById('social').value.trim();
            const photosFiles = document.getElementById('photos') ? document.getElementById('photos').files : [];
            const introVideo = document.getElementById('introVideo') ? document.getElementById('introVideo').files[0] : null;
            const portfolio = document.getElementById('portfolio').value.trim();
            const work = document.getElementById('sampleWork').value.trim();


            if (name === "") {
                alert("Please enter your full name.");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email === "" || !emailRegex.test(email)) {
                alert("Please enter a valid email address.");
                return;
            }

            const phoneRegex = /^[0-9]{10}$/;
            if (!phoneRegex.test(phone)) {
                alert("Please enter a valid 10-digit phone number.");
                return;
            }

            if (!experience) {
                alert("Please select your experience level.");
                return;
            }

            if (location === '') {
                alert("Please select whether you're based in Ujjain/Indore or willing to travel.");
                return;
            }

            if (languages.length === 0 && otherLanguage === '') {
                alert("Please select at least one language or specify another language.");
                return;
            }

            if (otherLanguage) languages.push(otherLanguage);

            if (acting === '') {
                alert("Please indicate whether you have acting experience.");
                return;
            }

            if (actingTypes.length === 0) {
                alert("Please select at least one option for Years of Acting Experience.");
                return;
            }

            if (age === "" || !/^[0-9]+$/.test(age)) {
                alert("Please enter a valid age.");
                return;
            }

            if (height === "") {
                alert("Please enter your height.");
                return;
            }

            if (weight === "" || !/^[0-9]+(\.[0-9]+)?$/.test(weight)) {
                alert("Please enter a valid weight (numbers only).");
                return;
            }

            // Social link is optional; no validation required

            // Require at least one photo or an intro video
            if ((photosFiles.length === 0 || photosFiles === undefined) && !introVideo) {
                alert("Please upload at least one photo or an intro video (30 seconds).");
                return;
            }

            if (photosFiles && photosFiles.length > 5) {
                alert("You can upload a maximum of 5 photos.");
                return;
            }

            const formData = new FormData();
            formData.append("name", name);
            formData.append("email", email);
            formData.append("phone", phone);
            formData.append("age", age);
            formData.append("height", height);
            formData.append("weight", weight);
            formData.append("experience", experience);
            formData.append("location", location);
            formData.append("languages", JSON.stringify(languages));
            formData.append("acting_experience", acting);
            formData.append("acting_types", JSON.stringify(actingTypes));
            if (social.length > 0) { formData.append("social", social); }
            // Append photos
            if (photosFiles && photosFiles.length > 0) {
                for (let i = 0; i < photosFiles.length; i++) {
                    formData.append('photos[]', photosFiles[i]);
                }
            }
            // Append intro video if provided
            if (introVideo) { formData.append('introVideo', introVideo); }
            formData.append("jobId",document.getElementById('j_id').innerHTML);

            if (portfolio.length>0) {
                formData.append("portfolio", portfolio);
            }
            if (work.length>0) {
                formData.append("work", work);
            }

            $("#loadingOverlay").show();

            $.ajax({
                url: 'https://thefilmkaar.pythonanywhere.com/submit-application', 
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false, 
                success: function (response) {
                    $("#loadingOverlay").hide();
                    $('#applicationModal').fadeOut();
                    document.getElementById('page').style.display='none';
                    document.getElementById('thanks').style.display='inline';
                },
                error: function (err) {
                    $("#loadingOverlay").hide();
                    console.error("Error submitting application:", err);
                    alert("There was an error submitting your application. Please try again.");
                },
            });
        }
    </script>
</head>

<body>
    <div class="career-page" id="thanks" style="display: none;">
        <a href="/">
            <h1>Filmkaar Production</h1>
        </a>
        <p>Thank you for submitting your application with us. Our team will review your application and if you are good fit, we will reach out to you soon :)</p>
        <a href="/">
            <h4>Back to Home</h3>
        </a>
    </div>
    <div class="career-page" id="page">
        <a href="/">
            <h1>Filmkaar Production</h1>
        </a>
        <a href="/">
            <h3>Home</h3>
        </a>
        <h2>Join Our Team</h2>
        <ul class="job-list">
        </ul>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
        <!-- Loading GIF -->
        <div class="loading">
            <img src="static/ll.gif" alt="Loading..." />
        </div>
    </div>
    <!-- Modal -->
    <div class="modal" id="applicationModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <center>
                <h2>Apply for <span id="job-title"></span></h2>
            </center>
            <span>Job ID: </span><span id="j_id"></span>
            <h3>Job Description:</h3>
            <p id="job_desciption"></p>
            <h3>Responsibilities:</h3>
            <ul>

            </ul>
            <form id="job-application-form">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address*</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number *</label>
                <input type="text" id="phone" name="phone" required>

                <label for="age">Age *</label>
                <input type="number" id="age" name="age" min="0" placeholder="Age in years" required>

                <label for="height">Height *</label>
                <input type="text" id="height" name="height" placeholder="Height (e.g. 5'9)" required>

                <label for="weight">Weight *</label>
                <input type="number" step="0.1" id="weight" name="weight" placeholder="Weight (kg)" required>

                <label for="experience">Experience Level *</label>
                <div id="experience">
                    <label><input type="radio" name="experience" value="Beginner" required> Beginner</label>
                    <label><input type="radio" name="experience" value="Intermediate" required> Intermediate</label>
                    <label><input type="radio" name="experience" value="Expert" required> Expert</label>
                </div>

                <label for="location">Are you based in Ujjain / Indore or willing to travel? *</label>
                <div id="location">
                    <label><input type="radio" name="location" value="Ujjain" required> Ujjain</label>
                    <label><input type="radio" name="location" value="Indore" required> Indore</label>
                    <label><input type="radio" name="location" value="Willing to travel" required> Willing to travel</label>
                </div>

                <label for="languages">Languages Known *</label>
                <div id="languages">
                    <label><input type="checkbox" name="languages[]" value="Hindi"> Hindi</label>
                    <label><input type="checkbox" name="languages[]" value="English"> English</label>
                    <label><input type="checkbox" name="languages[]" value="Other"> Other</label>
                </div>

                <label for="acting">Do you have acting experience? *</label>
                <div id="acting">
                    <label><input type="radio" name="acting" value="Yes" required> Yes</label>
                    <label><input type="radio" name="acting" value="No" required> No</label>
                </div>

                <label for="actingTypes">Years of Acting Experience in *</label>
                <div id="actingTypes">
                    <label><input type="checkbox" name="acting_types[]" value="Short Films"> Short Films</label>
                    <label><input type="checkbox" name="acting_types[]" value="Theatre"> Theatre</label>
                    <label><input type="checkbox" name="acting_types[]" value="Web Series"> Web Series</label>
                    <label><input type="checkbox" name="acting_types[]" value="Modeling"> Modeling</label>
                    <label><input type="checkbox" name="acting_types[]" value="No Experience"> No Experience</label>
                </div>

                <label for="portfolio">Portfolio Link (Optional)</label>
                <input type="text" id="portfolio" name="portfolio" required>

                <label for="social">Social Platform Link (LinkedIn/Instagram)</label>
                <input type="text" id="social" name="social">

                <label for="sampleWork">Sample Work Link (Optional)</label>
                <input type="text" id="sampleWork" name="sampleWork" required>

                <label for="photos">Upload Photos (up to 5)</label>
                <input type="file" id="photos" name="photos[]" accept="image/*" multiple>

                <label for="introVideo">Upload Intro Video (30 Seconds, Optional)</label>
                <input type="file" id="introVideo" name="introVideo" accept="video/*">

                <button type="button" onClick="validate()">Submit Application</button>
            </form>
        </div>
    </div>
</body>

</html>
